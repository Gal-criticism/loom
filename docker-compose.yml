version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loom_dev}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  centrigugo:
    image: centrifugo/centrifugo:v5
    ports:
      - "${CENTRIFUGO_PORT:-8000}:8000"
    volumes:
      - ./centrifugo_config.json:/etc/centrifugo/config.json
    environment:
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET}
    command: centrifugo -c /etc/centrifugo/config.json

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-loom}:${POSTGRES_PASSWORD:-loom_dev}@postgres:5432/${POSTGRES_DB:-loom}
      CENTRIFUGO_URL: ws://centrigugo:8000
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - postgres
      - centrigugo

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "${CLIENT_PORT:-8080}:8080"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
