version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom_dev
      POSTGRES_DB: loom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  centrigugo:
    image: centrifugo/centrifugo:v5
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo_config.json:/etc/centrifugo/config.json
    command: centrifugo -c /etc/centrifugo/config.json

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://loom:loom_dev@postgres:5432/loom
      CENTRIFUGO_URL: ws://centrigugo:8000
    depends_on:
      - postgres
      - centrigugo

volumes:
  postgres_data:
