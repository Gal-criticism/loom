name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Bun 检查 (Bun 在国内访问较快)
      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Backend Install & Build
        run: |
          cd backend
          bun install
          bun run build

      - name: Client Install & Build
        run: |
          cd client
          bun install
          bun run build

      # Go 检查 (可选，如果 go.sum 存在)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
        continue-on-error: true

      - name: Go modules
        run: |
          cd cmd/daemon
          go mod download 2>/dev/null || echo "Skipping Go modules"
        continue-on-error: true

      - name: Go Vet
        run: cd cmd/daemon && go vet ./... 2>/dev/null || echo "Skipping Go vet"
        continue-on-error: true
