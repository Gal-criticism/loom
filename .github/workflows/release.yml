name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        default: 'latest'
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: metadata
        run: |
          echo "VERSION=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.metadata.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=registry,ref=${{ github.repository }}/backend:latest
          cache-to: type=inline

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/client:${{ steps.metadata.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/client:latest
          cache-from: type=registry,ref=${{ github.repository }}/client:latest
          cache-to: type=inline

      - name: Build and push Centrifugo config
        run: |
          echo "发布版本: ${{ steps.metadata.outputs.VERSION }}"
          echo "镜像地址:"
          echo "  - ghcr.io/${{ github.repository }}/backend:${{ steps.metadata.outputs.VERSION }}"
          echo "  - ghcr.io/${{ github.repository }}/client:${{ steps.metadata.outputs.VERSION }}"
